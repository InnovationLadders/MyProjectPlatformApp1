name: sky_property_app
description: A simple Flutter app that displays a splash screen and opens a configurable URL in an in-app browser.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0
  path_provider: ^2.1.1
  device_info_plus: ^9.1.1
  intl: ^0.18.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/config.json
    - assets/images/logo.png
